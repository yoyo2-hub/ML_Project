<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Retail ML - Prédictions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green: #1abc9c;
            --green-dark: #0e9b7e;
            --green-pale: #e8f8f5;
            --navy: #1e2a38;
            --navy-light: #2c3e50;
            --surface: #ffffff;
            --bg: #f0f4f8;
            --border: #e1e8ef;
            --text: #1e2a38;
            --text-muted: #6b7a8d;
            --radius: 14px;
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: var(--navy);
            color: white;
            padding: 28px 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border-bottom: 3px solid var(--green);
        }
        header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        header .icon-wrap {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }

        /* ── NAV ── */
        nav {
            background: var(--surface);
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            gap: 4px;
        }
        nav button {
            flex: 1;
            padding: 16px 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        nav button i { font-size: 13px; }
        nav button:hover { color: var(--green); }
        nav button.active {
            color: var(--green);
            border-bottom-color: var(--green);
        }

        /* ── SECTIONS ── */
        section { display: none; padding: 40px 24px; }
        section.active { display: block; }

        /* ── FORM ── */
        form {
            background: var(--surface);
            padding: 36px 32px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            max-width: 560px;
            margin: auto;
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h2 i {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            background: var(--green-pale);
            color: var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* ── FIELD GROUPS ── */
        .field {
            margin-top: 18px;
        }
        .field label-text {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        /* Override the original label layout for modern stacked style */
        form label {
            display: flex;
            flex-direction: column;
            margin-top: 18px;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            gap: 6px;
        }
        form label i {
            display: none; /* icon now implied by label text */
        }
        form input, form select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text);
            background: var(--bg);
            transition: border-color 0.2s, background 0.2s;
            flex: unset;
        }
        form input:focus, form select:focus {
            border-color: var(--green);
            background: var(--surface);
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 188, 156, 0.12);
        }
        form input::placeholder { color: #aab4be; }

        /* ── SUBMIT BUTTON ── */
        form button[type="submit"] {
            margin-top: 28px;
            padding: 13px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            width: 100%;
            letter-spacing: 0.2px;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        form button[type="submit"]:hover { background: var(--green-dark); }
        form button[type="submit"]:active { transform: scale(0.98); }

        /* ── RESULT CARD ── */
        .result {
            margin: 0 auto 40px;
            padding: 28px 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 4px solid var(--green);
            font-size: 17px;
            max-width: 560px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 28px;
        }
        .result-text { flex: 1; text-align: left; }
        .result p {
            color: var(--text);
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .result p:last-of-type { margin-bottom: 0; }
        .result i { color: var(--green); margin-right: 6px; }
        canvas { width: 160px !important; height: 160px !important; flex-shrink: 0; }
    </style>
    <script>
        function showTab(tabId) {
            document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
            document.querySelectorAll("nav button").forEach(btn => btn.classList.remove("active"));
            document.getElementById(tabId).classList.add("active");
            document.getElementById("btn-" + tabId).classList.add("active");
        }
        window.onload = () => showTab("classification");
    </script>
</head>
<body>
    <header>
        <div class="icon-wrap"><i class="fas fa-chart-line"></i></div>
        <h1>Retail ML — Interface de Prédiction</h1>
    </header>

    <nav>
        <button id="btn-classification" onclick="showTab('classification')"><i class="fas fa-user-check"></i> Classification</button>
        <button id="btn-clustering" onclick="showTab('clustering')"><i class="fas fa-users"></i> Clustering</button>
        <button id="btn-regression" onclick="showTab('regression')"><i class="fas fa-calculator"></i> Régression</button>
    </nav>

    <!-- Onglet Classification -->
    <section id="classification">
        <form action="/predict_classification" method="post">
            <h2><i class="fas fa-user-check"></i> Prédiction du Churn</h2>
            <label><i class="fas fa-user"></i> Age<input type="number" name="Age" placeholder="ex : 34" required></label>
            <label><i class="fas fa-smile"></i> Satisfaction Score<input type="number" step="0.1" name="SatisfactionScore" placeholder="ex : 4.2" required></label>
            <label><i class="fas fa-sync-alt"></i> Fréquence<input type="number" name="Frequency" placeholder="ex : 12" required></label>
            <label><i class="fas fa-shopping-cart"></i> Total monétaire<input type="number" name="MonetaryTotal" placeholder="ex : 1500" required></label>
            <button type="submit"><i class="fas fa-search"></i> Prédire</button>
        </form>
    </section>

    <!-- Onglet Clustering -->
    <section id="clustering">
        <form action="/predict_clustering" method="post">
            <h2><i class="fas fa-users"></i> Segmentation Client</h2>
            <label><i class="fas fa-user"></i> Age<input type="number" name="Age" placeholder="ex : 34" required></label>
            <label><i class="fas fa-smile"></i> Satisfaction Score<input type="number" step="0.1" name="SatisfactionScore" placeholder="ex : 4.2" required></label>
            <label><i class="fas fa-sync-alt"></i> Fréquence<input type="number" name="Frequency" placeholder="ex : 12" required></label>
            <label><i class="fas fa-shopping-cart"></i> Total monétaire<input type="number" name="MonetaryTotal" placeholder="ex : 1500" required></label>
            <button type="submit"><i class="fas fa-search"></i> Prédire</button>
        </form>
    </section>

    <!-- Onglet Régression -->
    <section id="regression">
        <form action="/predict_regression" method="post">
            <h2><i class="fas fa-calculator"></i> Valeur Prédite</h2>
            <label><i class="fas fa-user"></i> Age<input type="number" name="Age" placeholder="ex : 34" required></label>
            <label><i class="fas fa-smile"></i> Satisfaction Score<input type="number" step="0.1" name="SatisfactionScore" placeholder="ex : 4.2" required></label>
            <label><i class="fas fa-sync-alt"></i> Fréquence<input type="number" name="Frequency" placeholder="ex : 12" required></label>
            <label><i class="fas fa-shopping-cart"></i> Total monétaire<input type="number" name="MonetaryTotal" placeholder="ex : 1500" required></label>
            <button type="submit"><i class="fas fa-search"></i> Prédire</button>
        </form>
    </section>

    <!-- Résultat -->
    {% if prediction_text %}
        <div class="result">
            <div class="result-text">
                <p><i class="fas fa-info-circle"></i> {{ prediction_text }}</p>
                {% if probability %}
                    <p><i class="fas fa-percentage"></i> Probabilité : {{ probability }}</p>
                {% endif %}
            </div>
            {% if probability %}
                <canvas id="probChart" width="160" height="160"></canvas>
                <script>
                    const ctx = document.getElementById('probChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Churn', 'Fidélité'],
                            datasets: [{
                                data: [parseFloat('{{ probability|replace("%","") }}'), 100 - parseFloat('{{ probability|replace("%","") }}')],
                                backgroundColor: ['#e74c3c', '#1abc9c']
                            }]
                        },
                        options: {
                            plugins: {
                                legend: { position: 'bottom' }
                            }
                        }
                    });
                </script>
            {% endif %}
        </div>
    {% endif %}
</body>
</html>
