<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse Churn Retail</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 600px;">
            <div class="card-header bg-primary text-white"><h3>Prédiction du Churn</h3></div>
            <div class="card-body">
                <form action="/predict" method="POST">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Âge</label><input type="number" name="Age" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">Satisfaction (1-5)</label><input type="number" step="0.1" name="SatisfactionScore" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">Premier achat (il y a X jours)</label><input type="number" name="FirstPurchaseDaysAgo" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">Ancienneté (Jours)</label><input type="number" name="CustomerTenureDays" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">Fréquence d'achat</label><input type="number" name="Frequency" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">Dépenses Totales</label><input type="number" name="MonetaryTotal" class="form-control" required></div>
                        <div class="col-12"><label class="form-label">Dernière IP de connexion</label><input type="text" name="LastLoginIP" class="form-control" placeholder="192.168.1.1"></div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 mt-4">Lancer l'Analyse</button>
                </form>

                {% if prediction_text %}
                <div class="alert mt-4 {{ 'alert-danger' if 'Risque' in prediction_text else 'alert-success' }}">
                    <h4 class="text-center">{{ prediction_text }}</h4>
                    <p class="text-center mb-0">Probabilité : {{ probability }}</p>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
